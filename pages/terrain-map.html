<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terrain Map — Vextreme</title>
<style>
  :root{
    --ground:      #14181d;
    --panel:       #1b212a;
    --panel-2:     #222a35;
    --line:        rgba(238,241,245,0.09);
    --line-strong: rgba(238,241,245,0.22);
    --ink:         #eef1f5;
    --ink-muted:   #8b93a1;
    --ink-faint:   #5b6472;
    --accent:      #3987e5;
    --accent-soft: rgba(57,135,229,0.16);
    --good:        #0ca30c;
    --warning:     #fab219;
    --critical:    #d03b3b;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "IBM Plex Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
  }
  :root[data-theme="light"]{
    --ground:#f4f5f3; --panel:#fff; --panel-2:#eef0ee;
    --line:rgba(11,11,11,.09); --line-strong:rgba(11,11,11,.22);
    --ink:#14181d; --ink-muted:#52585f; --ink-faint:#90959c;
    --accent:#2a78d6; --accent-soft:rgba(42,120,214,.12);
    --good:#0c8a0c; --warning:#a86400; --critical:#c22e2e;
  }
  @media (prefers-color-scheme:light){
    :root:not([data-theme="dark"]){
      --ground:#f4f5f3; --panel:#fff; --panel-2:#eef0ee;
      --line:rgba(11,11,11,.09); --line-strong:rgba(11,11,11,.22);
      --ink:#14181d; --ink-muted:#52585f; --ink-faint:#90959c;
      --accent:#2a78d6; --accent-soft:rgba(42,120,214,.12);
      --good:#0c8a0c; --warning:#a86400; --critical:#c22e2e;
    }
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{ background:var(--ground); color:var(--ink); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
  .app{ display:flex; flex-direction:column; height:100vh; }

  .topbar{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; padding:14px 20px; border-bottom:1px solid var(--line); background:var(--panel); flex:none; }
  .brand{ display:flex; flex-direction:column; gap:2px; margin-right:auto; min-width:220px; }
  .brand .eyebrow{ font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--accent); }
  .brand h1{ margin:0; font-size:18px; font-weight:650; letter-spacing:-.01em; }
  .brand .sub{ font-size:12px; color:var(--ink-muted); }

  .lens{ display:flex; align-items:center; gap:8px; }
  .lens-label{ font-size:11px; color:var(--ink-muted); font-family:var(--mono); text-transform:uppercase; letter-spacing:.08em; }
  .lens-toggle{ display:flex; background:var(--panel-2); border-radius:8px; padding:3px; gap:2px; border:1px solid var(--line); }
  .lens-btn{ appearance:none; border:none; background:transparent; color:var(--ink-muted); font-family:var(--sans); font-size:13px; font-weight:600; padding:7px 14px; border-radius:6px; cursor:pointer; }
  .lens-btn[aria-pressed="true"]{ background:var(--accent); color:#fff; }
  .lens-btn:not([aria-pressed="true"]):hover{ background:var(--line); color:var(--ink); }

  .legend{ display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .legend-item{ display:flex; align-items:center; gap:6px; font-size:12px; color:var(--ink-muted); }
  .legend-dot{ width:9px; height:9px; border-radius:50%; flex:none; }

  .search{ position:relative; }
  .search input{
    background:var(--panel-2); border:1px solid var(--line); color:var(--ink); border-radius:8px;
    padding:8px 12px; font-size:13px; font-family:var(--sans); width:200px;
  }
  .search input:focus{ outline:1.5px solid var(--accent); }

  .body{ display:flex; flex:1; min-height:0; }
  .map-wrap{ position:relative; flex:1; min-width:0; overflow:hidden; background: radial-gradient(ellipse at 30% 15%, var(--accent-soft), transparent 55%), var(--ground); }
  .map-hint{ position:absolute; left:16px; bottom:14px; z-index:2; font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); pointer-events:none; }
  .zoom-controls{ position:absolute; right:16px; bottom:14px; z-index:2; display:flex; flex-direction:column; gap:6px; }
  .zoom-btn{ width:28px; height:28px; border-radius:7px; border:1px solid var(--line-strong); background:var(--panel); color:var(--ink); font-size:15px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .zoom-btn:hover{ background:var(--panel-2); }
  .scope-chip{ position:absolute; left:16px; top:14px; z-index:2; font-family:var(--mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--ink-muted); background:var(--panel); border:1px solid var(--line); padding:6px 10px; border-radius:20px; }
  .scope-chip b{ color:var(--ink); }
  .load-state{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; color:var(--ink-muted); font-family:var(--mono); font-size:13px; }

  svg{ display:block; width:100%; height:100%; cursor:grab; }
  svg.dragging{ cursor:grabbing; }
  .cluster-halo{ fill:var(--panel-2); opacity:.5; }
  .cluster-label{ font-family:var(--mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; fill:var(--ink-faint); }
  .cluster-count{ font-family:var(--mono); font-size:10.5px; fill:var(--ink-faint); }
  .edge{ stroke:var(--line-strong); stroke-width:1.2; fill:none; }
  .edge.dim{ stroke:var(--line); }
  .edge.lit{ stroke:var(--accent); stroke-width:2; }
  .node-group{ cursor:pointer; }
  .node-halo{ fill:transparent; }
  .node-group.selected .node-halo{ fill:var(--accent-soft); }
  .node-group.matched .node-halo{ fill:var(--accent-soft); }
  .node-dot{ stroke:var(--ground); stroke-width:2; }
  .node-group:hover .node-dot{ filter:brightness(1.18); }
  .node-label{ font-family:var(--mono); font-size:9.5px; fill:var(--ink); paint-order:stroke; stroke:var(--ground); stroke-width:3px; }

  .panel{ width:340px; flex:none; border-left:1px solid var(--line); background:var(--panel); padding:20px; overflow-y:auto; }
  .panel-empty{ color:var(--ink-muted); font-size:13px; line-height:1.6; padding-top:40px; text-align:center; }
  .panel-empty .glyph{ font-size:26px; display:block; margin-bottom:10px; opacity:.5; }
  .panel-eyebrow{ font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); }
  .panel h2{ font-family:var(--mono); font-size:15px; font-weight:650; margin:4px 0 2px; word-break:break-all; line-height:1.3; }
  .status-pill{ display:inline-flex; align-items:center; gap:6px; font-size:11px; font-weight:700; padding:4px 10px; border-radius:20px; margin:8px 0 14px; text-transform:uppercase; letter-spacing:.04em; }
  .status-pill .dot{ width:7px; height:7px; border-radius:50%; }
  .status-good{ background:rgba(12,163,12,0.16); color:var(--good); }
  .status-warning{ background:rgba(250,178,25,0.16); color:var(--warning); }
  .status-critical{ background:rgba(208,59,59,0.16); color:var(--critical); }
  .panel p.role{ font-size:13px; line-height:1.55; color:var(--ink); margin:0 0 18px; }
  .field{ margin-bottom:16px; }
  .field-label{ font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); margin-bottom:6px; }
  .field-list{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:5px; }
  .field-list li{ font-family:var(--mono); font-size:11.5px; color:var(--ink-muted); padding-left:12px; position:relative; line-height:1.5; word-break:break-word; }
  .field-list li::before{ content:"›"; position:absolute; left:0; color:var(--ink-faint); }
  .field-empty{ font-size:11.5px; color:var(--ink-faint); font-style:italic; }
  .debt-item{ display:block; font-size:12px; padding:8px 10px; border-radius:7px; background:var(--panel-2); margin-bottom:6px; line-height:1.4; }
  .debt-item b{ font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:.05em; }
  .footnote{ margin-top:22px; padding-top:16px; border-top:1px solid var(--line); font-size:10.5px; color:var(--ink-faint); line-height:1.6; }

  .screen-lang-toggle{ display:flex; gap:6px; margin-bottom:10px; flex-wrap:wrap; }
  .screen-lang-toggle button{ appearance:none; border:1px solid var(--line-strong); background:var(--panel-2); color:var(--ink-muted); font-family:var(--mono); font-size:10.5px; font-weight:700; padding:5px 11px; border-radius:6px; cursor:pointer; }
  .screen-lang-toggle button[aria-pressed="true"]{ background:var(--accent); border-color:var(--accent); color:#fff; }
  .screen-thumb-frame{ border:1px solid var(--line-strong); border-radius:10px; overflow:hidden; max-height:320px; background:var(--ground); }
  .screen-thumb-frame img{ display:block; width:100%; height:auto; }
  .visit-btn{ display:flex; align-items:center; justify-content:center; gap:6px; background:var(--accent); color:#fff; text-decoration:none; font-weight:700; font-size:13px; padding:11px; border-radius:8px; margin:14px 0 6px; }
  .visit-btn:hover{ filter:brightness(1.08); }

  @media (max-width:760px){
    .body{ flex-direction:column; }
    .panel{ width:100%; border-left:none; border-top:1px solid var(--line); max-height:44vh; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <div class="eyebrow">Living map · self-updating</div>
      <h1>Terrain Map</h1>
      <div class="sub" id="subline">Loading…</div>
    </div>
    <div class="search">
      <input type="text" id="searchInput" placeholder="Find a node…" autocomplete="off">
    </div>
    <div class="lens">
      <span class="lens-label">Lens</span>
      <div class="lens-toggle" role="group" aria-label="Viewing lens">
        <button class="lens-btn" data-lens="engineer" aria-pressed="true">Engineer</button>
        <button class="lens-btn" data-lens="health" aria-pressed="false">Health lead</button>
      </div>
    </div>
    <div class="legend" id="legend"></div>
  </div>

  <div class="body">
    <div class="map-wrap">
      <div class="scope-chip" id="scopeChip">Loading…</div>
      <svg id="map" viewBox="0 0 2200 1050" preserveAspectRatio="xMidYMid meet">
        <g id="viewport"></g>
      </svg>
      <div id="loadState" class="load-state">Fetching data/terrain-map.json…</div>
      <div class="map-hint">drag to pan · scroll or +/&minus; to zoom · click a node · squares are real screens</div>
      <div class="zoom-controls">
        <button class="zoom-btn" id="zoomIn" aria-label="Zoom in">+</button>
        <button class="zoom-btn" id="zoomOut" aria-label="Zoom out">&minus;</button>
        <button class="zoom-btn" id="zoomReset" aria-label="Reset view" style="font-size:12px">&#8635;</button>
      </div>
    </div>
    <div class="panel" id="panel">
      <div class="panel-empty">
        <span class="glyph">&#8982;</span>
        Click any node to open its record — role, edges, tests, and the real open items that reference it.
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  'use strict';

  var BASE = '/Vextreme';
  var TERRAIN_URL = BASE + '/data/terrain-map.json';

  var STATUS_COLOR = { good:'var(--good)', warning:'var(--warning)', critical:'var(--critical)' };
  var STATUS_TEXT  = { good:'Healthy', warning:'Tested, open item(s)', critical:'Untested, open item(s)' };
  var CLUSTER_Y_MAX = 90; // recomputed once data loads

  var NS = 'http://www.w3.org/2000/svg';
  function el(tag, attrs) {
    var e = document.createElementNS(NS, tag);
    for (var k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }
  function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, function (c) { return { '&':'&amp;', '<':'&lt;', '>':'&gt;' }[c]; }); }
  function listOrEmpty(items) {
    if (!items || !items.length) return '<div class="field-empty">none recorded</div>';
    return '<ul class="field-list">' + items.map(function (i) { return '<li>' + esc(i) + '</li>'; }).join('') + '</ul>';
  }

  var viewport = document.getElementById('viewport');
  var byId = {};
  var edgeEls = [];
  var nodeEls = {};
  var selected = null;
  var panelLang = 'en';
  var DATA = null;

  function render(data) {
    DATA = data;
    data.nodes.forEach(function (n) { byId[n.id] = n; });

    document.getElementById('loadState').style.display = 'none';
    document.getElementById('subline').textContent =
      data.nodes.length + ' code nodes · ' + data.screens.length + ' live screens · computed fresh, not hand-authored';
    document.getElementById('scopeChip').innerHTML =
      'Full lattice — <b>' + data.nodes.length + ' nodes</b>, ' + data.clusters.length + ' clusters';

    // Legend
    var legend = document.getElementById('legend');
    ['good', 'warning', 'critical'].forEach(function (s) {
      var d = document.createElement('div');
      d.className = 'legend-item';
      d.innerHTML = '<span class="legend-dot" style="background:' + STATUS_COLOR[s] + '"></span>' + STATUS_TEXT[s];
      legend.appendChild(d);
    });

    // Cluster halos
    var maxRows = 0;
    data.clusters.forEach(function (c) {
      maxRows = Math.max(maxRows, c.rows);
      var w = c.x1 - c.x0;
      var h = c.rows * 130 + 40;
      viewport.appendChild(el('rect', { x: c.x0 + 20, y: 50, width: w - 40, height: h, rx: 16, class: 'cluster-halo' }));
      viewport.appendChild(el('text', { x: c.x0 + 40, y: 76, class: 'cluster-label' })).textContent = c.label;
      var countEl = el('text', { x: c.x0 + 40, y: 50 + h - 14, class: 'cluster-count' });
      countEl.textContent = c.count + ' node' + (c.count === 1 ? '' : 's');
      viewport.appendChild(countEl);
    });
    CLUSTER_Y_MAX = 50 + maxRows * 130 + 40 + 90;

    // Screens row (client-computed — a page layer, not part of the lattice grid)
    var screenY = CLUSTER_Y_MAX;
    data.screens.forEach(function (s, i) {
      var x = 110 + i * 150;
      s._x = x; s._y = screenY;
    });
    if (data.screens.length) {
      viewport.appendChild(el('text', { x: 40, y: screenY - 34, class: 'cluster-label' })).textContent = 'LIVE SCREENS';
    }

    // Edges
    edgeEls = data.edges.map(function (pair) {
      var a = byId[pair[0]], b = byId[pair[1]];
      if (!a || !b) return null;
      var d = 'M' + a.x + ',' + a.y + ' Q' + ((a.x + b.x) / 2 + (a.y - b.y) * 0.06) + ',' + ((a.y + b.y) / 2 + (b.x - a.x) * 0.06) + ' ' + b.x + ',' + b.y;
      var line = el('path', { class: 'edge', d: d });
      viewport.appendChild(line);
      return { a: pair[0], b: pair[1], el: line };
    }).filter(Boolean);

    // Code nodes
    data.nodes.forEach(function (n) {
      var g = el('g', { class: 'node-group', 'data-id': n.id });
      g.appendChild(el('circle', { cx: n.x, cy: n.y, r: 22, class: 'node-halo' }));
      g.appendChild(el('circle', { cx: n.x, cy: n.y, r: 7, class: 'node-dot', fill: STATUS_COLOR[n.status] }));
      var label = el('text', { x: n.x, y: n.y - 12, 'text-anchor': 'middle', class: 'node-label' });
      label.textContent = n.id.split('/').pop();
      g.appendChild(label);
      g.addEventListener('click', function () { selectNode(n.id, false); });
      viewport.appendChild(g);
      nodeEls[n.id] = g;
    });

    // Screen nodes (squares)
    data.screens.forEach(function (s) {
      var g = el('g', { class: 'node-group', 'data-id': 'screen:' + s.slug });
      g.appendChild(el('rect', { x: s._x - 26, y: s._y - 20, width: 52, height: 40, rx: 8, class: 'node-halo' }));
      g.appendChild(el('rect', { x: s._x - 10, y: s._y - 7, width: 20, height: 14, rx: 3, class: 'node-dot', fill: STATUS_COLOR.good }));
      var label = el('text', { x: s._x, y: s._y + 30, 'text-anchor': 'middle', class: 'node-label' });
      label.textContent = s.slug.length > 16 ? s.slug.slice(0, 15) + '…' : s.slug;
      g.appendChild(label);
      g.addEventListener('click', function () { selectNode('screen:' + s.slug, true); });
      viewport.appendChild(g);
      nodeEls['screen:' + s.slug] = g;
    });
  }

  function selectNode(id, isScreen) {
    if (selected) nodeEls[selected].classList.remove('selected');
    selected = id;
    nodeEls[id].classList.add('selected');

    edgeEls.forEach(function (e) {
      var lit = e.a === id || e.b === id;
      e.el.classList.toggle('lit', lit);
      e.el.classList.toggle('dim', !lit);
    });

    if (isScreen) {
      var slug = id.replace('screen:', '');
      var screen = DATA.screens.filter(function (s) { return s.slug === slug; })[0];
      renderScreenPanel(screen);
    } else {
      renderNodePanel(byId[id]);
    }
  }

  function renderNodePanel(n) {
    var panel = document.getElementById('panel');
    var debtsHtml = n.debts.length
      ? n.debts.map(function (id) {
          return '<div class="debt-item"><b>' + id + '</b><br>' + esc(DATA.debtTitles[id] || '') + '</div>';
        }).join('')
      : '<div class="field-empty">no open tech-debt / discussion / enhancement references this file</div>';

    panel.innerHTML =
      '<div class="panel-eyebrow">' + esc(n.cluster.toUpperCase()) + '</div>' +
      '<h2>' + esc(n.id) + '</h2>' +
      '<span class="status-pill status-' + n.status + '"><span class="dot" style="background:' + STATUS_COLOR[n.status] + '"></span>' + STATUS_TEXT[n.status] + '</span>' +
      '<p class="role">' + esc(n.role) + '</p>' +
      '<div class="field"><div class="field-label">Reads</div>' + listOrEmpty(n.reads) + '</div>' +
      '<div class="field"><div class="field-label">Writes</div>' + listOrEmpty(n.writes) + '</div>' +
      '<div class="field"><div class="field-label">Loaded by</div>' + listOrEmpty(n.loadedBy) + '</div>' +
      '<div class="field"><div class="field-label">Tested by</div>' + listOrEmpty(n.testedBy) + '</div>' +
      '<div class="field"><div class="field-label">Open items referencing this file</div>' + debtsHtml + '</div>' +
      '<div class="footnote">Computed live from docs/lattice-map.json and data/status/*.json by lib/build-terrain-map.js. This page never needs hand-editing when a node changes.</div>';
  }

  function renderScreenPanel(s) {
    var panel = document.getElementById('panel');
    var langs = Object.keys(s.screenshots);
    if (langs.indexOf(panelLang) === -1) panelLang = langs[0];

    panel.innerHTML =
      '<div class="panel-eyebrow">LIVE SCREEN</div>' +
      '<h2>' + esc(s.title) + '</h2>' +
      '<span class="status-pill status-good"><span class="dot" style="background:' + STATUS_COLOR.good + '"></span>Verified by screenshot</span>' +
      '<div class="field">' +
        '<div class="field-label">Real screenshot</div>' +
        '<div class="screen-lang-toggle" id="screenLangToggle">' +
          langs.map(function (l) { return '<button data-lang="' + l + '" aria-pressed="' + (l === panelLang) + '">' + l.toUpperCase() + '</button>'; }).join('') +
        '</div>' +
        '<div class="screen-thumb-frame"><img id="screenThumb" src="' + BASE + '/' + s.screenshots[panelLang] + '" alt="' + esc(s.title) + ' screenshot"></div>' +
      '</div>' +
      '<a class="visit-btn" href="' + s.liveUrl + '" target="_blank" rel="noopener">Open live page &#8599;</a>' +
      '<div class="field"><div class="field-label">Arcs</div>' + listOrEmpty(s.arcKeys) + '</div>' +
      '<div class="footnote">Thumbnail is a real file at docs/screenshots/, written by scripts/screenshot-page.js — not a mockup. Add a page + run the screenshot tool + rebuild the terrain map, and it appears here automatically.</div>';

    var toggle = document.getElementById('screenLangToggle');
    Array.prototype.forEach.call(toggle.querySelectorAll('button'), function (btn) {
      btn.addEventListener('click', function () {
        panelLang = btn.getAttribute('data-lang');
        Array.prototype.forEach.call(toggle.querySelectorAll('button'), function (b) { b.setAttribute('aria-pressed', String(b === btn)); });
        document.getElementById('screenThumb').src = BASE + '/' + s.screenshots[panelLang];
      });
    });
  }

  // ── Lens ─────────────────────────────────────────────────────────────────
  var lensBtns = document.querySelectorAll('.lens-btn');
  Array.prototype.forEach.call(lensBtns, function (btn) {
    btn.addEventListener('click', function () {
      Array.prototype.forEach.call(lensBtns, function (b) { b.setAttribute('aria-pressed', 'false'); });
      btn.setAttribute('aria-pressed', 'true');
      applyLens(btn.getAttribute('data-lens'));
    });
  });
  function applyLens(lens) {
    var dots = viewport.querySelectorAll('.node-dot');
    if (lens === 'health') {
      dots.forEach(function (d) { if (d.tagName === 'circle') d.setAttribute('r', 10); });
      edgeEls.forEach(function (e) { e.el.style.opacity = 0.2; });
    } else {
      dots.forEach(function (d) { if (d.tagName === 'circle') d.setAttribute('r', 7); });
      edgeEls.forEach(function (e) { e.el.style.opacity = 1; });
    }
  }

  // ── Search ───────────────────────────────────────────────────────────────
  document.getElementById('searchInput').addEventListener('input', function (e) {
    var q = e.target.value.trim().toLowerCase();
    Object.keys(nodeEls).forEach(function (id) {
      var matched = q.length > 1 && id.toLowerCase().indexOf(q) !== -1;
      nodeEls[id].classList.toggle('matched', matched);
    });
  });

  // ── Pan + zoom ───────────────────────────────────────────────────────────
  var svg = document.getElementById('map');
  var scale = 1, tx = 0, ty = 0, dragging = false, lastX = 0, lastY = 0;
  function applyTransform() { viewport.setAttribute('transform', 'translate(' + tx + ',' + ty + ') scale(' + scale + ')'); }
  svg.addEventListener('mousedown', function (e) { dragging = true; lastX = e.clientX; lastY = e.clientY; svg.classList.add('dragging'); });
  window.addEventListener('mousemove', function (e) { if (!dragging) return; tx += (e.clientX - lastX); ty += (e.clientY - lastY); lastX = e.clientX; lastY = e.clientY; applyTransform(); });
  window.addEventListener('mouseup', function () { dragging = false; svg.classList.remove('dragging'); });
  svg.addEventListener('wheel', function (e) { e.preventDefault(); scale = Math.min(2.6, Math.max(0.35, scale * (e.deltaY > 0 ? 0.92 : 1.08))); applyTransform(); }, { passive: false });
  document.getElementById('zoomIn').addEventListener('click', function () { scale = Math.min(2.6, scale * 1.15); applyTransform(); });
  document.getElementById('zoomOut').addEventListener('click', function () { scale = Math.max(0.35, scale * 0.87); applyTransform(); });
  document.getElementById('zoomReset').addEventListener('click', function () { scale = 1; tx = 0; ty = 0; applyTransform(); });
  var touchLast = null;
  svg.addEventListener('touchstart', function (e) { if (e.touches.length === 1) touchLast = e.touches[0]; });
  svg.addEventListener('touchmove', function (e) { if (e.touches.length !== 1 || !touchLast) return; var t = e.touches[0]; tx += (t.clientX - touchLast.clientX); ty += (t.clientY - touchLast.clientY); touchLast = t; applyTransform(); }, { passive: true });
  svg.addEventListener('touchend', function () { touchLast = null; });

  // ── Fetch ────────────────────────────────────────────────────────────────
  fetch(TERRAIN_URL)
    .then(function (r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(render)
    .catch(function (err) {
      document.getElementById('loadState').textContent = 'Could not load data/terrain-map.json (' + err.message + ')';
    });
}());
</script>
</body>
