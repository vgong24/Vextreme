<script>
(function() {
  document.addEventListener("DOMContentLoaded", function() {

    const shapes = {
      1: "●",
      2: "■",
      3: "▲",
      4: "◆",
      5: "⬟",
      6: "⬢",
      7: "–"
    };

    const container = document.getElementById("bcNavContainer");
    if (!container || !window.bcNavConfig) return;

    window.bcNavConfig.pages.forEach(page => {
      const isActive = page.slug === window.location.pathname;

      const link = document.createElement("a");
      link.href = page.slug;
      link.className = "bc-nav-item bc-level-" + page.level + (isActive ? " active" : "");

      link.innerHTML = `
        <span class="bc-nav-shape">${shapes[page.level] || shapes[7]}</span>
        <span class="bc-nav-title">${page.title}</span>
      `;

      container.appendChild(link);
    });

  });
})();
</script>

// -- SLUG HELPER -----------------------------------------
window.VEXTREME_slugFromUrl = function(url) {
  return url.replace(/\/$/, '').split('/').pop();
};

// -- RENDER: slug-based ----------------------------------
window.VEXTREME_renderArcRow = function(arcId, current) {
  const arc = window.VEXTREME_ARCS[arcId];
  if (!arc) return '<div style="font-family:monospace;font-size:11px;color:#b45830;padding:8px 0;">Arc "' + arcId + '" not found.</div>';

  const all = arc.sections.flatMap(function(s) { return s.entries; });
  const total = all.length;

  var currentIdx;
  if (typeof current === 'number') {
    currentIdx = all.findIndex(function(e) { return e.n === current; });
  } else {
    currentIdx = all.findIndex(function(e) {
      return window.VEXTREME_slugFromUrl(e.url) === current;
    });
  }

  if (currentIdx === -1) return '<div style="font-family:monospace;font-size:11px;color:#b45830;padding:8px 0;">Entry "' + current + '" not found in arc "' + arcId + '".</div>';

  const prev     = currentIdx > 0 ? all[currentIdx - 1] : null;
  const next     = currentIdx < total - 1 ? all[currentIdx + 1] : null;
  const position = currentIdx + 1;

  const currentSection = arc.sections.find(function(s) {
    return s.entries.some(function(e) {
      return typeof current === 'number'
        ? e.n === current
        : window.VEXTREME_slugFromUrl(e.url) === current;
    });
  });

  let dotsHTML = '';
  let flatIdx = 0;
  arc.sections.forEach(function(section, si) {
    if (si > 0) dotsHTML += '<div class="arc-section-gap"></div>';
    section.entries.forEach(function(entry, ei) {
      const isActive = typeof current === 'number'
        ? entry.n === current
        : window.VEXTREME_slugFromUrl(entry.url) === current;
      const isPast   = flatIdx < currentIdx;
      const cls = isActive ? 'arc-dot active' : isPast ? 'arc-dot visited' : 'arc-dot';
      const con = isPast ? 'arc-connector passed' : 'arc-connector';
      dotsHTML += '<div class="arc-dot-wrap">';
      dotsHTML += '<a class="' + cls + '" href="' + entry.url + '" title="' + (flatIdx + 1) + '. ' + entry.title + '" aria-label="' + entry.title + '"></a>';
      if (ei < section.entries.length - 1) dotsHTML += '<div class="' + con + '"></div>';
      dotsHTML += '</div>';
      flatIdx++;
    });
  });

  if (arc.renderMode === 'position') {
    return '<div class="arc-nav-row arc-nav-row--position">'
      + '<div class="arc-nav-header">'
      + '<span class="arc-nav-title">'
      + '<a class="arc-nav-parent-link" href="' + arc.parent.url + '">' + arc.parent.title + '</a>'
      + '</span>'
      + '<div class="arc-nav-row-right">'
      + '<span class="arc-nav-position">' + position + ' / ' + total + '</span>'
      + '<a class="arc-nav-arrow' + (prev ? '' : ' disabled') + '" href="' + (prev ? prev.url : '#') + '">←</a>'
      + '<a class="arc-nav-arrow' + (next ? '' : ' disabled') + '" href="' + (next ? next.url : '#') + '">→</a>'
      + '</div>'
      + '</div>'
      + '</div>';
  }

  return '<div class="arc-nav-row">'
    + '<div class="arc-nav-header">'
    + '<span class="arc-nav-title">'
    + '<a class="arc-nav-parent-link" href="' + arc.parent.url + '">' + arc.parent.title + '</a>'
    + '  ·  ' + (currentSection ? currentSection.label : '')
    + '</span>'
    + '<div class="arc-nav-row-right">'
    + '<span class="arc-nav-position">' + position + ' / ' + total + '</span>'
    + '<a class="arc-nav-arrow' + (prev ? '' : ' disabled') + '" href="' + (prev ? prev.url : '#') + '">←</a>'
    + '<a class="arc-nav-arrow' + (next ? '' : ' disabled') + '" href="' + (next ? next.url : '#') + '">→</a>'
    + '</div>'
    + '</div>'
    + '<div class="arc-nav-dots">' + dotsHTML + '</div>'
    + '</div>';
};

window.VEXTREME_mount = function() {
  const el = document.getElementById('arcNavMount');
  if (!el || typeof PAGE_ARCS === 'undefined') return;

  var resolvedArcs = PAGE_ARCS;

  if (PAGE_ARCS.length === 1 && PAGE_ARCS[0].slug && !PAGE_ARCS[0].arcId) {
    var slug = PAGE_ARCS[0].slug;
    var dotArcs = [];
    var positionArcs = [];

    Object.keys(window.VEXTREME_ARCS).forEach(function(arcId) {
      var arc = window.VEXTREME_ARCS[arcId];
      var all = arc.sections.flatMap(function(s) { return s.entries; });
      var hasSlug = all.some(function(e) {
        return window.VEXTREME_slugFromUrl(e.url) === slug;
      });
      if (hasSlug) {
        var entry = { arcId: arcId, current: slug };
        if (arc.renderMode === 'position') {
          positionArcs.push(entry);
        } else {
          dotArcs.push(entry);
        }
      }
    });

    resolvedArcs = dotArcs.concat(positionArcs);

    // Sort by arc priority — surface sections first (1), cross-reference middle (2), full timeline last (99)
    resolvedArcs.sort(function(a, b) {
      var pa = (window.VEXTREME_ARCS[a.arcId] && window.VEXTREME_ARCS[a.arcId].priority) || 2;
      var pb = (window.VEXTREME_ARCS[b.arcId] && window.VEXTREME_ARCS[b.arcId].priority) || 2;
      return pa - pb;
    });
  }

  var _c = resolvedArcs[0].current;
  var firstArc = window.VEXTREME_ARCS[resolvedArcs[0].arcId];
  var firstAll = firstArc ? firstArc.sections.flatMap(function(s) { return s.entries; }) : [];
  var currentEntry = firstAll.find(function(e) {
    return typeof _c === 'number'
      ? e.n === _c
      : window.VEXTREME_slugFromUrl(e.url) === _c;
  });
  var pageTitle = currentEntry ? currentEntry.title : '';

  var rowsHTML = resolvedArcs.map(function(a) {
    return window.VEXTREME_renderArcRow(a.arcId, a.current);
  }).join('');

  var footerHTML = '<div class="arc-nav-current">'
    + '<div class="arc-nav-current-label">You are here</div>'
    + '<div class="arc-nav-current-title">' + pageTitle + '</div>'
    + '</div>';

  el.innerHTML = '<div class="arc-nav">' + rowsHTML + footerHTML + '</div>';
};

document.addEventListener('DOMContentLoaded', window.VEXTREME_mount);
