<!-- @dsCard group="Spacing" viewport="700x180" name="Borders (GitHub-adjacent)" subtitle="Subtle, cool, slightly more authored than default GitHub restraint" -->
<link rel="stylesheet" href="../styles.css">
<div data-theme="dark" style="background:var(--bg-canvas); padding:20px; display:flex; gap:14px;">
  <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:16px; font:var(--text-caption); color:var(--text-tertiary);">border-subtle</div>
  <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px; font:var(--text-caption); color:var(--text-tertiary);">border-default</div>
  <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-strong); border-radius:var(--radius-md); padding:16px; font:var(--text-caption); color:var(--text-tertiary);">border-strong</div>
</div>
