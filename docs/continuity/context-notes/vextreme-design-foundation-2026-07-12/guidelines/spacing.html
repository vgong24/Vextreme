<!-- @dsCard group="Spacing" viewport="700x220" name="Scale & Radii" subtitle="4px base scale · architectural radii" -->
<link rel="stylesheet" href="../styles.css">
<div data-theme="dark" style="background:var(--bg-canvas); padding:20px; display:flex; flex-direction:column; gap:14px;">
  <div style="display:flex; align-items:flex-end; gap:8px;">
    <div style="width:4px;height:4px;background:var(--gray-8)"></div>
    <div style="width:8px;height:8px;background:var(--gray-8)"></div>
    <div style="width:12px;height:12px;background:var(--gray-8)"></div>
    <div style="width:16px;height:16px;background:var(--gray-8)"></div>
    <div style="width:24px;height:24px;background:var(--gray-8)"></div>
    <div style="width:32px;height:32px;background:var(--gray-8)"></div>
    <div style="width:48px;height:48px;background:var(--gray-8)"></div>
  </div>
  <div style="display:flex; gap:14px;">
    <div style="width:80px;height:56px;border-radius:var(--radius-sm);border:1px solid var(--border-default); display:flex;align-items:center;justify-content:center;font:var(--text-mono-xs);color:var(--text-tertiary)">sm 4</div>
    <div style="width:80px;height:56px;border-radius:var(--radius-md);border:1px solid var(--border-default); display:flex;align-items:center;justify-content:center;font:var(--text-mono-xs);color:var(--text-tertiary)">md 6</div>
    <div style="width:80px;height:56px;border-radius:var(--radius-lg);border:1px solid var(--border-default); display:flex;align-items:center;justify-content:center;font:var(--text-mono-xs);color:var(--text-tertiary)">lg 10</div>
    <div style="width:80px;height:56px;border-radius:var(--radius-full);border:1px solid var(--border-default); display:flex;align-items:center;justify-content:center;font:var(--text-mono-xs);color:var(--text-tertiary)">full</div>
  </div>
</div>
