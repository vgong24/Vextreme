<!-- @dsCard group="Colors" viewport="700x360" name="Neutral Ramp" subtitle="Cool grayscale — dark mode (home) values" -->
<link rel="stylesheet" href="../styles.css">
<div style="display:flex; flex-direction:column; gap:10px; padding:20px; background:var(--bg-canvas); font-family:var(--font-sans);">
  <div style="display:grid; grid-template-columns:repeat(10,1fr); gap:6px;">
    <div style="grid-column:span 10; font:var(--text-caption); color:var(--text-tertiary); letter-spacing:var(--tracking-label); text-transform:uppercase; margin-bottom:2px;">gray-0 → gray-9</div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-0);border:1px solid var(--gray-4)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-1)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-2)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-3)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-4)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-5)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-6)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-7)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-8)"></div>
    <div style="height:56px;border-radius:var(--radius-sm);background:var(--gray-9)"></div>
  </div>
  <div style="display:flex; gap:16px; padding-top:6px;">
    <div style="flex:1; height:110px; border-radius:var(--radius-md); background:var(--black); border:1px solid var(--gray-4); display:flex; align-items:center; justify-content:center; color:var(--white); font:var(--text-label); letter-spacing:var(--tracking-label); text-transform:uppercase;">--black</div>
    <div style="flex:1; height:110px; border-radius:var(--radius-md); background:var(--white); border:1px solid #d8dbe0; display:flex; align-items:center; justify-content:center; color:var(--black); font:var(--text-label); letter-spacing:var(--tracking-label); text-transform:uppercase;">--white</div>
  </div>
</div>
