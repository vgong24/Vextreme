<!-- @dsCard group="Colors" viewport="700x300" name="Dark Mode Semantics" subtitle="Home mode — canvas, surface, border, text" -->
<link rel="stylesheet" href="../styles.css">
<div data-theme="dark" style="background:var(--bg-canvas); padding:20px; display:flex; flex-direction:column; gap:10px;">
  <div style="display:flex; gap:10px;">
    <div style="flex:1; background:var(--bg-canvas); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:14px;">
      <div style="font:var(--text-caption); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:var(--tracking-label);">canvas</div>
    </div>
    <div style="flex:1; background:var(--bg-surface); border:1px solid var(--border-subtle); border-radius:var(--radius-md); padding:14px;">
      <div style="font:var(--text-caption); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:var(--tracking-label);">surface</div>
    </div>
    <div style="flex:1; background:var(--bg-surface-raised); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:14px;">
      <div style="font:var(--text-caption); color:var(--text-tertiary); text-transform:uppercase; letter-spacing:var(--tracking-label);">surface raised</div>
    </div>
  </div>
  <div style="background:var(--bg-surface); border:1px solid var(--border-default); border-radius:var(--radius-md); padding:16px; display:flex; flex-direction:column; gap:6px;">
    <div style="font:var(--text-body); color:var(--text-primary);">Text primary — decisions, evidence, structure</div>
    <div style="font:var(--text-body-sm); color:var(--text-secondary);">Text secondary — supporting detail</div>
    <div style="font:var(--text-mono-xs); color:var(--text-tertiary); letter-spacing:var(--tracking-mono);">TEXT TERTIARY — SYSTEM STATE</div>
  </div>
</div>
