<!-- @dsCard group="Colors" viewport="700x180" name="Evidentiary Status" subtitle="Used only for state — pass/fail/caution/info" -->
<link rel="stylesheet" href="../styles.css">
<div data-theme="dark" style="background:var(--bg-surface); padding:20px; display:flex; gap:20px; align-items:center; border-radius:var(--radius-md);">
  <div style="display:flex; align-items:center; gap:8px; font:var(--text-mono-sm); color:var(--text-secondary); letter-spacing:var(--tracking-mono);">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--status-success);display:inline-block;"></span>PASS
  </div>
  <div style="display:flex; align-items:center; gap:8px; font:var(--text-mono-sm); color:var(--text-secondary); letter-spacing:var(--tracking-mono);">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--status-caution);display:inline-block;"></span>PENDING
  </div>
  <div style="display:flex; align-items:center; gap:8px; font:var(--text-mono-sm); color:var(--text-secondary); letter-spacing:var(--tracking-mono);">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--status-critical);display:inline-block;"></span>FAILED
  </div>
  <div style="display:flex; align-items:center; gap:8px; font:var(--text-mono-sm); color:var(--text-secondary); letter-spacing:var(--tracking-mono);">
    <span style="width:8px;height:8px;border-radius:50%;background:var(--status-info);display:inline-block;"></span>INFO
  </div>
</div>
