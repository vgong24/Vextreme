<!-- @dsCard group="Components" viewport="700x420" name="Forms — Input, Select, Checkbox, Switch" -->
<link rel="stylesheet" href="../../styles.css">
<script src="../../_ds_bundle.js"></script>
<div id="root" data-theme="dark" style="background:var(--bg-canvas); padding:24px;"></div>
<script type="text/babel" data-presets="react">
  const { Input, Select, Checkbox, Switch } = window.Vextreme;
  function Demo() {
    const [checked, setChecked] = React.useState(true);
    const [on, setOn] = React.useState(false);
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 18, maxWidth: 340 }}>
        <Input label="Journey Name" placeholder="Q3 handoff" />
        <Input label="Node ID" mono placeholder="jrn_8a2f" hint="Auto-generated if left blank" />
        <Input label="Owner" error="Required" />
        <Select label="Visibility" options={[{label:'Private', value:'private'},{label:'Org', value:'org'},{label:'Public', value:'public'}]} />
        <Checkbox label="Include AI-authored steps" checked={checked} onChange={setChecked} />
        <Switch label="Auto-continue on verified steps" checked={on} onChange={setOn} />
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
