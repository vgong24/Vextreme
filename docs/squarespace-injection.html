<!-- ============================================================
  VEXTREME — Squarespace Code Injection
  docs/squarespace-injection.html — source of truth
  v4 — zero-config interface, template auto-detected from pages.json

  TWO blocks:
    1. HEADER → Settings → Advanced → Code Injection → Header
               Fonts only. Must be in <head> for render performance.

    2. FOOTER → Settings → Advanced → Code Injection → Footer
               Loads vextreme.js, calls VEXTREME() with no args.
               Everything auto-detected: slug from URL, template
               from pages.json, env from hostname.

  PER-PAGE (optional — most pages need nothing):
    Only needed when the URL slug differs from the arc slug.
    Set window.VEXTREME_OVERRIDE before the footer script runs.

    <div id="arcNavMount"></div>
    <script>window.VEXTREME_OVERRIDE = { slug: 'different-slug' };</script>

  ADDING A NEW PAGE:
    1. Add slug to data/arcs.json
    2. If it has a page template, add template field to data/pages.json
    3. Add <div id="arcNavMount"></div> to the Squarespace page
    4. Nothing else required — the footer loader handles the rest

  CACHE BUSTING:
    Increment VEXTREME_VER in the footer script when any asset changes.
    Match it to VEXTREME_VER in shell.js and DEFAULT_CACHE in vextreme.js.
    Pages never need updating — version lives in two files only.
    Current: v=4
  ============================================================ -->




<!-- ============================================================
  1. HEADER INJECTION — FONTS ONLY
  Settings → Advanced → Code Injection → Header
  ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">




<!-- ============================================================
  2. FOOTER INJECTION
  Settings → Advanced → Code Injection → Footer
  ============================================================ -->

<script>
(function () {
  'use strict';

  var BASE = 'https://cdn.jsdelivr.net/gh/vgong24/vextreme@main';

  // Bump this when any asset changes. Matches VEXTREME_VER in shell.js
  // and DEFAULT_CACHE in vextreme.js. Pages never need updating.
  var VEXTREME_VER = '?v=5';

  if (window._vexLoaderInit) return;

  var el    = document.createElement('script');
  el.src    = BASE + '/lib/vextreme.js' + VEXTREME_VER;
  el.onload = function () {
    if (typeof window.VEXTREME === 'function') {
      // VEXTREME_OVERRIDE set by a per-page block, or empty → all defaults
      var cfg = window.VEXTREME_OVERRIDE || {};
      cfg.env = cfg.env || 'squarespace';
      window.VEXTREME(cfg);
    }
  };
  el.onerror = function () {
    console.warn('[VEXTREME] Failed to load vextreme.js');
  };
  document.head.appendChild(el);

}());
</script>




<!-- ============================================================
  PER-PAGE — only when URL slug differs from arc slug.
  Place in Page Settings → Advanced → Page Header Code Injection.
  Must appear BEFORE the footer injection runs.

  <div id="arcNavMount"></div>
  <script>window.VEXTREME_OVERRIDE = { slug: 'correct-slug' };</script>

  For debug mode on any page:
  <script>window.VEXTREME_OVERRIDE = { debug: true };</script>

  LEGACY PATTERNS — still work via URL auto-detection:
    const PAGE_ARCS = [{ slug: 'x' }]; window.VEXTREME_mount && ...
    VEXTREME_page('x');
    window.PAGE_ARCS = [{ slug: 'x' }];
  These are harmless — the loader overrides them. Update when touched.
  ============================================================ -->
