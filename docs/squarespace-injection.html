<!-- ============================================================
  VEXTREME — Squarespace Code Injection
  docs/squarespace-injection.html — source of truth
  v2 — fixed mount timing, cache busting on all assets

  THREE blocks:
    1. HEADER  → Settings → Advanced → Code Injection → Header
    2. FOOTER  → Settings → Advanced → Code Injection → Footer
    3. PER-PAGE → each page's Custom Code (only for pages needing
                  arc nav that can't use auto slug detection)

  CACHE BUSTING:
    Increment CACHE_VER when any file in /lib or /components changes.
    This forces jsDelivr to serve fresh files instead of cached ones.
    Current: v=2
  ============================================================ -->




<!-- ============================================================
  1. HEADER INJECTION
  WHY HEADER: Stylesheets load before HTML renders — no flash of
  unstyled content. No scripts here (scripts block rendering).
  ============================================================ -->

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/vgong24/vextreme@main/styles/design-system.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/vgong24/vextreme@main/styles/arc-nav.css">




<!-- ============================================================
  2. FOOTER INJECTION
  WHY FOOTER: Runs after page HTML is parsed, so #arcNavMount
  exists in the DOM when mount() is called.

  LOAD ORDER:
    fetch arcs.json + pages.json (parallel, async)
      → arc-nav.js       (defines VEXTREME_mount)
      → archive-renderer.js
      → section-toggle.js + bc-nav.js (parallel)
      → resolve PAGE_ARCS (auto-detect from URL if not set)
      → VEXTREME_mount() ← called here, after everything is ready
      → dispatch 'vextreme:ready'

  WHY MOUNT IS CALLED HERE NOT IN arc-nav.js:
    arc-nav.js used to register its own DOMContentLoaded listener.
    By the time arc-nav.js loads (after two async fetches + dynamic
    script injection), DOMContentLoaded has already fired — so that
    listener never ran. The loader now owns the single mount call,
    after the full chain resolves and PAGE_ARCS is guaranteed set.
  ============================================================ -->

<script>
(function () {
  'use strict';

  var BASE      = 'https://cdn.jsdelivr.net/gh/vgong24/vextreme@main';
  var DATA      = BASE + '/data';
  var LIB       = BASE + '/lib';
  var COMP      = BASE + '/components';
  var CACHE_VER = '?v=2'; // ← increment when any lib/component file changes

  if (window._vexLoaderInit) return;
  window._vexLoaderInit = true;

  // Step 1: fetch data files in parallel
  Promise.all([
    fetch(DATA + '/arcs.json'  + CACHE_VER).then(function (r) { return r.json(); }),
    fetch(DATA + '/pages.json' + CACHE_VER).then(function (r) { return r.json(); })
  ])

  // Step 2: assign globals, load arc-nav engine
  .then(function (results) {
    if (!window.VEXTREME_ARCS)  window.VEXTREME_ARCS  = results[0].arcs;
    if (!window.VEXTREME_PAGES) window.VEXTREME_PAGES = results[1];
    return loadScript(LIB + '/arc-nav.js' + CACHE_VER);
  })

  // Step 3: load archive renderer
  .then(function () {
    return loadScript(LIB + '/archive-renderer.js' + CACHE_VER);
  })

  // Step 4: load components in parallel
  .then(function () {
    return Promise.all([
      loadScript(COMP + '/section-toggle.js' + CACHE_VER),
      loadScript(COMP + '/bc-nav.js'         + CACHE_VER)
    ]);
  })

  // Step 5: resolve PAGE_ARCS then mount
  .then(function () {
    // Auto-detect slug from URL if page hasn't set window.PAGE_ARCS.
    // Covers old pages not yet updated and pages with no per-page block.
    // e.g. /claude-answers-the-doubt → slug: 'claude-answers-the-doubt'
    if (!window.PAGE_ARCS) {
      var slug = window.location.pathname.replace(/\/$/, '').split('/').pop();
      if (slug) window.PAGE_ARCS = [{ slug: slug }];
    }

    // Mount — arc-nav.js defines VEXTREME_mount, data is loaded,
    // PAGE_ARCS is set. All three conditions met. Mount once.
    if (typeof window.VEXTREME_mount === 'function') {
      window.VEXTREME_mount();
    }

    // Signal ready. Per-page scripts that need to do additional work
    // (e.g. force a specific arc) can listen for this event.
    window._vexReady = true;
    document.dispatchEvent(new CustomEvent('vextreme:ready'));
  })

  .catch(function (err) {
    console.warn('[VEXTREME] Loader error:', err);
  });

  // Inject a <script> tag and return a Promise.
  // Skips if the same src is already in the DOM (idempotent).
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      if (document.querySelector('script[src="' + src + '"]')) {
        resolve(); return;
      }
      var el     = document.createElement('script');
      el.src     = src;
      el.onload  = resolve;
      el.onerror = function () {
        console.warn('[VEXTREME] Failed to load: ' + src);
        resolve(); // resolve not reject — let the chain continue
      };
      document.head.appendChild(el);
    });
  }

}());
</script>




<!-- ============================================================
  3. PER-PAGE BLOCK (optional — most pages don't need this)

  The footer auto-detects the slug from window.location.pathname.
  You only need this block when:
    - The page URL slug differs from the arc entry slug
    - You need to force a specific arc (not all matching arcs)
    - You need to re-mount after a dynamic content change

  If used: window.PAGE_ARCS must be set BEFORE vextreme:ready fires.
  The simplest place is in a Code Block above the arcNavMount div,
  so it runs during HTML parse before the loader resolves.

  Template (change only the slug string):
  ============================================================ -->
