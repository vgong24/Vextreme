name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build test prerequisites
        run: node lib/strings-compile.js && node lib/build-archives.js

      - name: Run tests
        run: node --test tests/*.test.js
