name: Key Alignment Check

on: [pull_request]

permissions:
  pull-requests: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run key alignment check
        run: node lib/check-key-alignment.js --json > /tmp/key-alignment-report.json

      - name: Post alignment report as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/key-alignment-report.json', 'utf8'));
            const nd = report.nodes;
            const ar = report.arcs;

            const nodeStatus  = (nd.missingFromIndex.length || nd.extraInIndex.length) ? '⚠️' : '✅';
            const arcStatus   = (ar.missingFromIndex.length || ar.extraInIndex.length)  ? '⚠️' : '✅';
            const overallOK   = nodeStatus === '✅' && arcStatus === '✅';

            const missingNodes = nd.missingFromIndex.length
              ? `\n> **Missing from index:** \`${nd.missingFromIndex.join('`, `')}\``
              : '';
            const extraNodes = nd.extraInIndex.length
              ? `\n> **Extra in index:** \`${nd.extraInIndex.join('`, `')}\``
              : '';
            const missingArcs = ar.missingFromIndex.length
              ? `\n> **Missing from index:** \`${ar.missingFromIndex.join('`, `')}\``
              : '';
            const extraArcs = ar.extraInIndex.length
              ? `\n> **Extra in index:** \`${ar.extraInIndex.join('`, `')}\``
              : '';

            const body = [
              '## Key Alignment Report',
              '',
              '| Type | Total | In index | Missing | Extra |',
              '|------|-------|----------|---------|-------|',
              `| ${nodeStatus} Nodes | ${nd.total} | ${nd.inIndex} | ${nd.missingFromIndex.length} | ${nd.extraInIndex.length} |`,
              `| ${arcStatus} Arcs  | ${ar.total} | ${ar.inIndex} | ${ar.missingFromIndex.length} | ${ar.extraInIndex.length} |`,
              missingNodes,
              extraNodes,
              missingArcs,
              extraArcs,
              '',
              overallOK
                ? '_All keys aligned — nodes.json, arcs-v2.json, and index.json are in sync._'
                : '_Misalignments found. Run `node lib/build-index.js` to rebuild the index._',
              '',
              '> This is a non-blocking informational check.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body,
            });
