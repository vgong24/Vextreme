name: Build Vextreme Index

on:
  push:
    branches: [main]
    paths:
      - 'data/nodes.json'
      - 'data/arcs-v2.json'
      - 'data/strings/**'
      - 'lib/strings-compile.js'
      - 'lib/build-index.js'
      - 'lib/build-archives.js'
      - 'lib/build-sitemap.js'
      - 'lib/build-index-page.js'
      - 'pages/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile strings
        run: node lib/strings-compile.js

      - name: Build index.json
        run: node lib/build-index.js

      - name: Build archives.html
        run: node lib/build-archives.js

      - name: Build sitemap.xml
        run: node lib/build-sitemap.js

      - name: Build index.html
        run: node lib/build-index-page.js

      - name: Commit artifacts
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/strings/compiled data/index.json pages/archives.html sitemap.xml index.html
          git diff --staged --quiet && echo "No changes to commit" || git commit -m "Auto-rebuild artifacts [skip ci]"
          git push
