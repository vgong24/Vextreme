name: Build Vextreme Index

on:
  push:
    branches: [main]
    paths:
      - 'data/nodes.json'
      - 'data/arcs-v2.json'
      - 'lib/build-index.js'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build index.json
        run: node lib/build-index.js

      - name: Commit index.json
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add data/index.json
          git diff --staged --quiet && echo "index.json unchanged" || git commit -m "Auto-rebuild index.json [skip ci]"
          git push
