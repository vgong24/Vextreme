name: Build Vextreme Index

on:
  push:
    branches: [main]
    paths: &build_trigger_paths
      - 'data/nodes.json'
      - 'data/arcs-v2.json'
      - 'data/viewmodels.json'
      - 'data/departments.json'
      - 'data/strings/**'
      - 'data/status/**'
      - 'config/lessons/**'
      - 'lib/strings-compile.js'
      - 'lib/build-arc-bundles.js'
      - 'lib/build-string-identity-index.js'
      - 'lib/build-index.js'
      - 'lib/build-archives.js'
      - 'lib/build-page-health.js'
      - 'lib/build-demo.js'
      - 'lib/build-specimens.js'
      - 'lib/build-sitemap.js'
      - 'lib/build-index-page.js'
      - 'lib/build-vextreme.js'
      - 'lib/build-sw.js'
      - 'lib/build-status.js'
      - 'lib/build-ecosystem-hub.js'
      - 'lib/build-lessons.js'
      - 'lib/build-roles.js'
      - 'lib/build-roles-page.js'
      - 'lib/build-terrain-map.js'
      - 'docs/lattice-map.json'
      - 'docs/screenshots/**'
      - 'data/council-kernel.json'
      - 'lib/check-key-alignment.js'
      - 'lib/auto-discover-nodes.js'
      - 'wip/**'
      - 'widgets/**'
      - 'data/specimens.json'
      - 'pages/**'
  # Session 022 continued: also runs on the PR itself, not just after merge to
  # main. Without this, a raw file move (like wip/*.html -> pages/*.html) left
  # data/index.json / pages/archives.html / data/status.json stale until
  # someone ran the build scripts by hand and pushed a fix — which is exactly
  # what happened on PR #58. Reuses the same trigger path list (the &anchor
  # above) so there is one list to maintain, not two that can drift apart.
  pull_request:
    paths: *build_trigger_paths

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # For a pull_request event, checkout defaults to the synthetic merge
          # ref (refs/pull/N/merge), which nothing can push back to. Check out
          # the PR's actual head branch instead so the commit below lands
          # somewhere real. github.head_ref is empty for push events, so this
          # falls through to github.ref (refs/heads/main) unchanged there.
          ref: ${{ github.head_ref || github.ref }}
          # Full history required: lib/bump-fab-version.js walks git log/show
          # against older commits to find the last VERSION-bump commit and
          # diff data files against it. The default shallow clone (depth 1)
          # would make that plumbing fail silently (empty diffs -> no bump
          # ever detected) rather than loudly, so this is not optional.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile strings
        run: node lib/strings-compile.js

      - name: Build string identity index (localization identity pilot)
        run: node lib/build-string-identity-index.js

      - name: Build arc-chunked language bundles (od-001/td-006 pilot)
        run: node lib/build-arc-bundles.js

      - name: Build index.json
        run: node lib/build-index.js

      - name: Build God Scripts
        run: node lib/build-vextreme.js

      - name: Build Service Worker
        run: node lib/build-sw.js

      - name: Build analysis-index.json
        run: node lib/build-analysis-index.js

      - name: Build page capability health
        run: node lib/build-page-health.js

      - name: Build archives.html
        run: node lib/build-archives.js

      - name: Build vextreme-demo.html
        run: node lib/build-demo.js

      - name: Build specimens
        run: node lib/build-specimens.js

      - name: Build sitemap.xml
        run: node lib/build-sitemap.js

      - name: Build index.html
        run: node lib/build-index-page.js

      - name: Build lessons.json
        run: node lib/build-lessons.js

      - name: Build status.json
        run: node lib/build-status.js

      - name: Build roles.json
        run: node lib/build-roles.js

      - name: Build ecosystem-hub.html
        run: node lib/build-ecosystem-hub.js

      - name: Build roles-index.html
        run: node lib/build-roles-page.js

      - name: Build terrain-map.json
        run: node lib/build-terrain-map.js

      - name: Auto-increment fab-lang.js CDN version
        # Replaces a hand-maintained bump (Session 025: it had never been
        # bumped since introduction) with one computed from what actually
        # changed since the last bump commit — see lib/compute-fab-version.js.
        run: node lib/bump-fab-version.js

      - name: Commit artifacts
        # On push (to main): commit with [skip ci] as before — the same
        # GITHUB_TOKEN push cannot retrigger a new workflow run anyway (GitHub
        # blocks that to prevent recursive runs), so this is just a clear
        # marker for anyone reading history, not what actually prevents a loop.
        # On pull_request: push straight to the PR's own head branch. Note
        # this corrective push will NOT automatically re-run the PR's other
        # checks (same GITHUB_TOKEN limitation) — rerun the non-mutating Tests
        # and Key Alignment workflows once against the fixed head. If Build is
        # rerun too, the bot-head guard below makes that rerun non-mutating.
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          # A PR artifact commit is necessarily built from its human-authored
          # parent. Rebuilding commit-derived artifacts from the bot commit
          # itself would move HEAD again and can never converge. A manual rerun
          # on that already-corrected head therefore verifies the build steps
          # above but must not create another artifact commit.
          case "$(git log -1 --pretty=%s)" in
            "Auto-rebuild artifacts for PR #"*)
              echo "Current head is already a PR artifact correction; skipping a recursive artifact commit."
              exit 0
              ;;
          esac
          git add data/strings/compiled data/strings/reports data/index.json data/lessons.json data/roles.json data/status.json data/page-health.json data/terrain-map.json dist sw.js pages/archives.html pages/vextreme-demo.html pages/specimens.html pages/specimen-*.html pages/ecosystem-hub.html pages/roles-index.html sitemap.xml index.html widgets/fab-lang.js
          if git diff --staged --quiet; then
            echo "No changes to commit"
          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            git commit -m "Auto-rebuild artifacts for PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:${{ github.head_ref }}
          else
            git commit -m "Auto-rebuild artifacts [skip ci]"
            git push
          fi
